kind = "web"
previewPath = "/"
title = "OppAI Stream API"
version = "1.0.0"
id = "artifacts/oppai-docs"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19564
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/oppai-docs run dev"

[services.env]
PORT = "19564"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/oppai-docs", "run", "build"]
publicDir = "artifacts/oppai-docs/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
